# Nginx reverse proxy for STORM ID
# Place this behind your SSL termination (e.g. Cloudflare, Let's Encrypt via certbot)

server {
    listen 443 ssl http2;
    server_name id.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/id.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/id.yourdomain.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy to storm-id-ui (Next.js)
    location / {
        proxy_pass http://127.0.0.1:4455;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name id.yourdomain.com;
    return 301 https://$host$request_uri;
}
