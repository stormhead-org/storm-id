# Nginx reverse proxy for STORM ID
# Place this behind your SSL termination (e.g. Cloudflare, Let's Encrypt via certbot)
#
# Services referenced by container name (Docker network):
#   storm-id-hydra:4444   — Ory Hydra OAuth2/OIDC
#   storm-id-kratos:4433  — Ory Kratos public API
#   storm-id-ui:3000      — Next.js UI + API Gateway

server {
    listen 443 ssl http2;
    server_name id.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/id.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/id.yourdomain.com/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # ── Hydra OAuth2/OIDC endpoints → straight to Hydra ──

    location /oauth2/ {
        proxy_pass http://storm-id-hydra:4444;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OIDC Discovery (Hydra only — Kratos /.well-known/ory/* stays in location /)
    location = /.well-known/openid-configuration {
        proxy_pass http://storm-id-hydra:4444;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /.well-known/jwks.json {
        proxy_pass http://storm-id-hydra:4444;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebAuthn script → Kratos directly with caching ──

    location = /api/self/webauthn.js {
        proxy_pass http://storm-id-kratos:4433/.well-known/ory/webauthn.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Everything else → storm-id-ui (Next.js API Gateway + UI) ──

    location / {
        proxy_pass http://storm-id-ui:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name id.yourdomain.com;
    return 301 https://$host$request_uri;
}
