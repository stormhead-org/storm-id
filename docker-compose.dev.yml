services:
  hydra-migrate:
    container_name: storm-id-hydra-migrate
    image: oryd/hydra:v26.2.0
    restart: "no"
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${HYDRA_DB}?sslmode=disable&max_conns=20
      - SECRETS_SYSTEM=${HYDRA_SECRETS_SYSTEM}
    command: migrate sql -e --yes
    depends_on:
      postgres:
        condition: service_healthy

  hydra:
    container_name: storm-id-hydra
    image: oryd/hydra:v26.2.0
    restart: unless-stopped
    command: serve -c /etc/hydra/hydra.yaml all ${HYDRA_DEV_MODE:+--dev}
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${HYDRA_DB}?sslmode=disable&max_conns=20
      - SECRETS_SYSTEM=${HYDRA_SECRETS_SYSTEM}
      - SECRETS_COOKIE=${HYDRA_SECRETS_COOKIE}
      - HYDRA_OIDC_PAIRWISE_SALT=${HYDRA_OIDC_PAIRWISE_SALT}
    ports:
      - "4444:4444"
      - "4445:4445"
    volumes:
      - ./configs/hydra:/etc/hydra:ro
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4444/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kratos-migrate:
    container_name: storm-id-kratos-migrate
    image: oryd/kratos:v26.2.0
    restart: "no"
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${KRATOS_DB}?sslmode=disable&max_conns=20
    command: migrate sql -e --yes
    depends_on:
      postgres:
        condition: service_healthy

  kratos:
    container_name: storm-id-kratos
    image: oryd/kratos:v26.2.0
    restart: unless-stopped
    command: serve -c /etc/kratos/kratos.yaml all --watch-courier
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${KRATOS_DB}?sslmode=disable&max_conns=20
      - SECRETS_COOKIE=${KRATOS_SECRETS_COOKIE}
      - SECRETS_CIPHER=${KRATOS_SECRETS_CIPHER}
    ports:
      - "4433:4433"
      - "4434:4434"
    volumes:
      - ./configs/kratos:/etc/kratos:ro
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4433/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  keto-migrate:
    container_name: storm-id-keto-migrate
    image: oryd/keto:v26.2.0
    restart: "no"
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${KETO_DB}?sslmode=disable
    volumes:
      - ./configs/keto:/etc/keto:ro
    command: migrate up -c /etc/keto/keto.yaml --yes
    depends_on:
      postgres:
        condition: service_healthy

  keto:
    container_name: storm-id-keto
    image: oryd/keto:v26.2.0
    restart: unless-stopped
    environment:
      - DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${KETO_DB}?sslmode=disable
    volumes:
      - ./configs/keto:/etc/keto:ro
    ports:
      - "4466:4466"
      - "4467:4467"
    command: serve -c /etc/keto/keto.yaml
    depends_on:
      keto-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:4466/health/alive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  stormid-migrate:
    container_name: storm-id-migrate
    image: postgres:17-alpine
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_HOST: ${POSTGRES_HOST}
    entrypoint: ["sh", "/seed.sh"]
    volumes:
      - ./scripts/seed.sh:/seed.sh:ro
    depends_on:
      postgres:
        condition: service_healthy

  storm-id-ui:
    container_name: storm-id-ui
    build:
      context: ./storm-id-ui
      args:
        NEXT_PUBLIC_ORY_SDK_URL: http://localhost:4455
    restart: unless-stopped
    ports:
      - "4455:3000"
    environment:
      - NEXT_PUBLIC_ORY_SDK_URL=http://kratos:4433
      - KRATOS_PUBLIC_URL=http://kratos:4433
      - KRATOS_ADMIN_URL=http://kratos:4434
      - KRATOS_BROWSER_URL=${KRATOS_BROWSER_URL:-http://localhost:4433}
      - HYDRA_ADMIN_URL=http://hydra:4445
      - HYDRA_PUBLIC_URL=http://hydra:4444
      - HYDRA_BROWSER_URL=${HYDRA_BROWSER_URL:-http://localhost:4444}
      - KETO_READ_URL=http://keto:4466
      - KETO_WRITE_URL=http://keto:4467
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/stormid?sslmode=disable
      - DEFAULT_RETURN_URL=/welcome
      - NODE_ENV=development
      - PORT=3000
      - HYDRA_STATE_SECRET=${HYDRA_STATE_SECRET}
      - PUBLIC_URL=${PUBLIC_URL}
      - KRATOS_COOKIE_NAME=${KRATOS_COOKIE_NAME:-ory_kratos_session}
    depends_on:
      stormid-migrate:
        condition: service_completed_successfully
      kratos:
        condition: service_healthy
      hydra:
        condition: service_healthy
      keto:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    container_name: storm-id-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  test-app:
    build: ./test-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - PORT=5173
      - HYDRA_PUBLIC_URL=http://hydra:4444
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5173/",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
volumes:
  postgres-data:
    driver: local
